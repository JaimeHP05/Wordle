<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle - Ingeniería Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <div id="user-menu" class="hidden">
                <span id="user-greeting"></span>
                <button id="btn-logout" aria-label="Cerrar Sesión">Salir</button>
            </div>
            
            <button id="btn-login-modal" aria-label="Usuario" class="icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
        </div>

        <h1>Wordle</h1>

        <div class="header-right">
            <button id="btn-config" class="icon-btn" aria-label="Configuración">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
            <button id="btn-history" class="icon-btn hidden" aria-label="Ver histórico">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </button>
        </div>
    </header>

    <dialog id="auth-modal" class="modal">
        <div class="auth-tabs">
            <button id="tab-login" class="auth-tab active">Iniciar Sesión</button>
            <button id="tab-register" class="auth-tab">Registrarse</button>
        </div>

        <form id="form-login" method="dialog">
            <div class="form-group">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" required>
            </div>
            <div class="form-group">
                <label for="login-password">Contraseña:</label>
                <input type="password" id="login-password" required>
            </div>
            <p id="login-error" class="error-msg hidden"></p>
            <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <form id="form-register" class="hidden" method="dialog">
            <div class="form-group">
                <label for="reg-user">Usuario:</label>
                <input type="text" id="reg-user" required minlength="3">
            </div>
            <div class="form-group">
                <label for="reg-email">Email:</label>
                <input type="email" id="reg-email" required>
            </div>
            <div class="form-group">
                <label for="reg-password">Contraseña:</label>
                <input type="password" id="reg-password" required placeholder="Mín. 8 chars, 1 mayús, 1 num">
            </div>
            <p id="reg-error" class="error-msg hidden"></p>
            <button type="submit" class="btn-primary">Crear Cuenta</button>
        </form>
        <button id="close-auth" class="btn-secondary" style="margin-top: 10px;">Cancelar</button>
    </dialog>

    <dialog id="history-modal" class="modal">
        <h2>Histórico de Palabras</h2>
        <p>Palabras de los últimos 5 días (Configuración actual):</p>
        <ul id="history-list" class="history-list"></ul>
        <button id="close-history" class="btn-primary">Cerrar</button>
    </dialog>
    
    <main>
        <div id="announcer" aria-live="polite" class="sr-only"></div>

        <div id="loading-screen" class="hidden">
            <p>Descargando diccionario, por favor espera...</p>
        </div>

        <div id="game-board" class="board" role="grid" aria-label="Tablero de juego"></div>
        <div id="keyboard" class="keyboard" aria-label="Teclado virtual"></div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <dialog id="config-modal" class="modal">
        <h2>Configurar Partida</h2>
        <form id="config-form" method="dialog">
            <div class="form-group">
                <label for="lang-select">Idioma:</label>
                <select id="lang-select">
                    <option value="es">Español</option>
                    <option value="en">Inglés</option>
                </select>
            </div>
            <div class="form-group">
                <label for="length-select">Número de letras:</label>
                <div class="slider-container">
                    <input type="range" id="length-select" min="5" max="10" value="5" step="1">
                    <span id="slider-value" class="slider-value">5</span>
                </div>
            </div>
            <button type="submit" class="btn-primary">¡Empezar a jugar!</button>
        </form>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
