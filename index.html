<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <div id="user-menu" class="hidden">
                <span id="user-greeting"></span>
                <button id="btn-stats" class="icon-btn" aria-label="Estadísticas">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                </button>
                <button id="btn-logout" aria-label="Cerrar Sesión" data-i18n="logout">Salir</button>
            </div>
            
            <button id="btn-login-modal" aria-label="Usuario" class="icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
        </div>

        <h1>Wordle</h1>

        <div class="header-right">
            <button id="btn-toggle-blog" aria-label="Abrir Blog" class="icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </button>
            <button id="btn-history" class="icon-btn hidden" aria-label="Ver histórico">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </button>
            <button id="btn-config" aria-label="Configuración" class="icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
        </div>
    </header>

    <dialog id="auth-modal" class="modal">
        <div class="auth-tabs">
            <button id="tab-login" class="auth-tab active" data-i18n="login_tab">Iniciar Sesión</button>
            <button id="tab-register" class="auth-tab" data-i18n="register_tab">Registrarse</button>
        </div>
        <form id="form-login" method="dialog">
            <div class="form-group">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" required>
            </div>
            <div class="form-group">
                <label for="login-password" data-i18n="password">Contraseña:</label>
                <input type="password" id="login-password" required>
            </div>
            <p id="login-error" class="error-msg hidden"></p>
            <button type="submit" class="btn-primary" data-i18n="login_btn">Entrar</button>
        </form>
        <form id="form-register" class="hidden" method="dialog">
            <div class="form-group">
                <label for="reg-user" data-i18n="user">Usuario:</label>
                <input type="text" id="reg-user" required minlength="3">
            </div>
            <div class="form-group">
                <label for="reg-email">Email:</label>
                <input type="email" id="reg-email" required>
            </div>
            <div class="form-group">
                <label for="reg-password" data-i18n="password">Contraseña:</label>
                <input type="password" id="reg-password" required>
            </div>
            <p id="reg-error" class="error-msg hidden"></p>
            <button type="submit" class="btn-primary" data-i18n="register_btn">Crear Cuenta</button>
        </form>
        <button id="close-auth" class="btn-secondary" style="margin-top: 10px;" data-i18n="cancel">Cancelar</button>
    </dialog>

    <dialog id="stats-modal" class="modal">
        <div class="auth-tabs">
            <button id="tab-mystats" class="auth-tab active" data-i18n="my_panel">Mi Panel</button>
            <button id="tab-ranking" class="auth-tab" data-i18n="ranking_tab">Ranking Global</button>
        </div>
        
        <div id="mystats-view">
            <div class="dashboard-grid">
                <div class="stat-box">
                    <h3 id="stat-played">0</h3>
                    <p data-i18n="stat_played">Jugadas</p>
                </div>
                <div class="stat-box">
                    <h3 id="stat-winpct">0%</h3>
                    <p data-i18n="stat_wins">Victorias</p>
                </div>
                <div class="stat-box">
                    <h3 id="stat-streak">0</h3>
                    <p data-i18n="stat_streak">Racha Act.</p>
                </div>
                <div class="stat-box">
                    <h3 id="stat-max-streak">0</h3>
                    <p data-i18n="stat_max">Mejor Racha</p>
                </div>
            </div>
            
            <button id="btn-share" class="btn-primary hidden" style="margin: 15px 0; display:flex; align-items:center; justify-content:center; gap:10px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3"></circle>
                    <circle cx="6" cy="12" r="3"></circle>
                    <circle cx="18" cy="19" r="3"></circle>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                </svg>
                <span data-i18n="share_btn">Compartir Resultado</span>
            </button>

            <h4 style="margin-top:20px; text-align:left;" data-i18n="dist_title">Distribución de Intentos</h4>
            
            <div class="chart-tabs">
                <button id="btn-chart-bar" class="chart-tab active" data-i18n="chart_bar">Barras</button>
                <button id="btn-chart-pie" class="chart-tab" data-i18n="chart_pie">Círculo</button>
            </div>

            <div id="stat-distribution" class="stat-distribution"></div>
            
            <div id="stat-pie-container" class="stat-pie-container hidden">
                <div id="stat-pie" class="stat-pie"></div>
                <div id="stat-legend" class="stat-legend"></div>
            </div>
        </div>

        <div id="ranking-view" class="hidden">
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th data-i18n="player">Jugador</th>
                        <th data-i18n="attempts">Intentos Medios</th>
                        <th data-i18n="time">Tiempo Medio</th>
                    </tr>
                </thead>
                <tbody id="ranking-body"></tbody>
            </table>
        </div>
        <button id="close-stats" class="btn-secondary" style="margin-top:20px;" data-i18n="close">Cerrar</button>
    </dialog>

    <dialog id="history-modal" class="modal">
        <h2 data-i18n="history_title">Histórico de Palabras</h2>
        <p data-i18n="history_desc">Palabras de los últimos 5 días:</p>
        <ul id="history-list" class="history-list"></ul>
        <button id="close-history" class="btn-primary" data-i18n="close">Cerrar</button>
    </dialog>
    
    <div id="toast-container" class="toast-container"></div>

    <dialog id="config-modal" class="modal">
        <h2 data-i18n="config_title">Configuración</h2>
        <form id="config-form" method="dialog">
            <div class="form-group">
                <label for="lang-select" data-i18n="lang_label">Idioma:</label>
                <select id="lang-select">
                    <option value="es">Español</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="form-group">
                <label for="length-select" data-i18n="length_label">Número de letras:</label>
                <div class="slider-container">
                    <input type="range" id="length-select" min="5" max="10" value="5" step="1">
                    <span id="slider-value" class="slider-value">5</span>
                </div>
            </div>
            
            <hr style="border-color: var(--border-color); margin: 20px 0;">
            <h3 data-i18n="a11y_title">Accesibilidad</h3>
            
            <div class="form-group toggle-group">
                <label for="theme-toggle" data-i18n="theme_label">Modo Claro:</label>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
            <div class="form-group toggle-group">
                <label for="anim-toggle" data-i18n="anim_label">Reducir Animaciones:</label>
                <label class="switch">
                    <input type="checkbox" id="anim-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
            <div class="form-group toggle-group">
                <label for="colorblind-toggle" data-i18n="colorblind_label">Alto Contraste:</label>
                <label class="switch">
                    <input type="checkbox" id="colorblind-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
            <div class="form-group toggle-group">
                <label for="dyslexic-toggle" data-i18n="dyslexic_label">Fuente para Dislexia:</label>
                <label class="switch">
                    <input type="checkbox" id="dyslexic-toggle">
                    <span class="slider round"></span>
                </label>
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 15px;" data-i18n="save_play">Guardar y Jugar</button>
        </form>
    </dialog>

    <div class="app-layout">
        <aside id="blog-panel" class="blog-panel">
            <div class="blog-header">
                <h2 data-i18n="community_title">Comunidad</h2>
                <button id="btn-close-blog" class="icon-btn mobile-only">✖</button>
            </div>
            <div id="blog-messages" class="blog-messages"></div>
            <form id="blog-form" class="blog-form">
                <textarea id="blog-input" disabled autocomplete="off" rows="3"></textarea>
                <button type="submit" id="btn-send-blog" class="btn-primary" disabled data-i18n="send">Enviar</button>
            </form>
        </aside>

        <main id="game-main">
            <div id="announcer" aria-live="assertive" class="sr-only"></div>
            <div id="loading-screen" class="hidden">
                <p data-i18n="loading">Descargando diccionario, por favor espera...</p>
            </div>
            <div id="game-board" class="board" role="grid" aria-label="Tablero de juego"></div>
            <div id="keyboard" class="keyboard" aria-label="Teclado virtual"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
